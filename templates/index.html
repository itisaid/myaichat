<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超体智能音响</title>
    <link rel="preload" href="/static/css/app.css" as="style">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="status-container">
                <div class="status-dot"></div>
                <span id="search-icon" class="search-icon" aria-hidden="true"></span>
                <div class="status-text" id="status-text">系统启动中...</div>
            </div>
            <button type="button" class="wake-btn" id="wake-btn" aria-label="开始对话" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 6v-2h2v2h-2zm6.32-2.06A8.97 8.97 0 0 0 21 12a9 9 0 1 0-9 9c1.85 0 3.58-.56 5.01-1.52l3.58 3.58 1.41-1.41-3.58-3.58z"/>
                </svg>
                对话
            </button>
            <button type="button" class="hold-btn" id="hold-btn" aria-label="按住续录">
                续录
            </button>
            <button type="button" class="stop-btn" id="stop-btn" aria-label="终止当前操作">
                终止
            </button>
        </div>

        <div class="header-right">
            <label class="option-check" id="thinking-label">
                <input type="checkbox" id="thinking-check"> 深度思考
            </label>
            <label class="option-check" id="search-label">
                <input type="checkbox" id="search-check"> 联网搜索
            </label>
            <select id="model-selector" class="model-selector">
                <option value="qwen-plus" selected>Qwen</option>
                <option value="deepseek-chat">DeepSeek</option>
                <option value="glm-4">GLM</option>
            </select>
        </div>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
